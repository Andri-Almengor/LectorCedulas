name: Apply runtime session update

on:
  push:
    branches:
      - agent/control-sesiones-y-rendimiento
    paths:
      - .github/workflows/apply-runtime-update.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/control-sesiones-y-rendimiento
          fetch-depth: 0

      - name: Build updated reader entrypoint
        shell: bash
        run: |
          cat tmp_runtime_update/part_*.txt > template/main.py
          python -m py_compile template/main.py

      - name: Update documentation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('README.txt')
          text = path.read_text(encoding='utf-8')
          section = '''

Control de sesiones y rendimiento
---------------------------------
- Si ya existe otra sesión del lector, la nueva instancia permite detenerla antes de continuar.
- Al cambiar de usuario o sesión activa en Windows, la instancia anterior se cierra automáticamente.
- Cancelar la detección del lector y usar Salir desde la bandeja detienen el puerto COM, el atajo y todos los hilos del lector.
- El proceso se ejecuta con prioridad reducida y el sondeo serial usa pausas mayores para disminuir el consumo de CPU.
- La escritura de campos y tabulaciones incorpora pequeñas esperas para no saturar aplicaciones de formularios lentas.
'''
          if 'Control de sesiones y rendimiento' not in text:
              text = text.rstrip() + section + '\n'
              path.write_text(text, encoding='utf-8')
          PY

      - name: Remove temporary updater files
        shell: bash
        run: |
          rm -rf tmp_runtime_update
          rm -f .github/workflows/apply-runtime-update.yml

      - name: Commit final changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Mejora control de sesiones y rendimiento"
          git push origin agent/control-sesiones-y-rendimiento
